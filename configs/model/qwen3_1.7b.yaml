# Model: Qwen3-1.7B-Instruct
#
# References:
#   paper/theory.md §1   -- middle of the size triplet
#   paper/REDACTED.md §C.3 -- QLoRA hyperparameter mirror

# @package model
size: 1.7b
hf_id: Qwen/Qwen3-1.7B-Instruct
fallback_hf_id: Qwen/Qwen2.5-1.5B-Instruct

training:
  learning_rate: 5.0e-5
  lr_schedule: cosine
  warmup_ratio: 0.1
  num_epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 4
  max_seq_length: 8192
  lora_rank: 32
  lora_alpha: 128.0
  lora_target_modules:
    - self_attn.q_proj
    - self_attn.k_proj
    - self_attn.v_proj
    - self_attn.o_proj
    - mlp.gate_proj
    - mlp.up_proj
    - mlp.down_proj
  lora_dropout: 0.0
  weight_decay: 0.01

expected_minutes_per_cell: 28
expected_vram_gb: 11
