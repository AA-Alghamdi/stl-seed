# Pre-commit hooks for stl-seed.
# Install with: uv run pre-commit install
# Run on demand: uv run pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Markdown auto-formatter (analogue of ruff-format for .md files).
  # --wrap=no preserves intentional long lines in paper/ docs.
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-tables
          - mdformat-frontmatter
        args: [--wrap=no]
        files: \.md$
        exclude: ^(\.github/.*\.md|paper/figures/.*)

  # Spell-checker for code comments, docstrings, and markdown.
  # Ignore-words-list collects domain terms (kals, sloppy-model abbreviations,
  # truncated identifier fragments) that codespell would otherwise flag.
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=als,nin,ond,thes,equil,fo,nd,coul,strat,wronly,cliping,iy,trough,ther
          - --skip=*.lock,*.svg,*.png,*.parquet,uv.lock,paper/figures/*,runs/*,data/*,docker/Dockerfile
        additional_dependencies:
          - tomli

  # Python security scanner. Catches hardcoded secrets, eval of untrusted
  # input, pickle on untrusted data, weak random for security purposes, etc.
  # Config (skips, exclude_dirs) lives in pyproject.toml [tool.bandit].
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -ll]
        additional_dependencies: [".[toml]"]
        files: ^(src|scripts)/.*\.py$
        exclude: ^tests/

  # Local hooks ---------------------------------------------------------------
  - repo: local
    hooks:
      # Pyright runs against the project venv (warn-only — never blocks the
      # commit, but surfaces type regressions in the diff).
      - id: pyright
        name: pyright (warn-only)
        entry: bash -c 'uv run pyright src || (echo "pyright reported issues (warn-only, not blocking commit)"; exit 0)'
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

