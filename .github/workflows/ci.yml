name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          # Cache the uv download/wheel cache and the resolved lock entries
          # keyed on uv.lock — invalidates whenever dependencies change.
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (CPU-only, no mlx/cuda extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}
        # mlx requires Apple Silicon; bnb (cuda extra) requires NVIDIA — both
        # would fail on ubuntu-latest. dev extra is sufficient for CI tests.

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Format check with ruff
        run: uv run ruff format --check src tests

      - name: Type check with pyright (warn-only)
        run: uv run pyright src
        continue-on-error: true

      - name: Markdown format check (mdformat)
        run: uv run pre-commit run mdformat --all-files

      - name: Spell check (codespell)
        run: uv run pre-commit run codespell --all-files

      - name: Security scan (bandit)
        run: uv run pre-commit run bandit --all-files

      - name: REDACTED firewall (forbidden imports + vocabulary)
        run: bash scripts/REDACTED.sh

      - name: Run tests with coverage (CPU-only marks)
        run: |
          uv run pytest -m "not gpu and not cuda and not mlx" \
            --cov=stl_seed \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=pytest-junit.xml

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
            pytest-junit.xml
          if-no-files-found: warn
          retention-days: 14

      # Codecov upload (public repos: no token required, the action uses
      # tokenless uploads via GitHub OIDC). For private repos add a
      # CODECOV_TOKEN secret and reference it via `token: ${{ secrets.CODECOV_TOKEN }}`.
      # `fail_ci_if_error: false` keeps Codecov outages from breaking CI.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        if: matrix.python-version == '3.11'

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Build wheel and sdist
        run: uv build

      - name: List build artifacts
        run: ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
