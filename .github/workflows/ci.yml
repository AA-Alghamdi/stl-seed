name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies (no GPU extras)
        run: uv sync --extra dev
        # Skip mlx/cuda extras in CI — they require Apple Silicon / CUDA respectively.

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Format check with ruff
        run: uv run ruff format --check src tests

      - name: Type check with pyright
        run: uv run pyright src
        continue-on-error: true  # warn-only during early development

      - name: Run tests (CPU only, skip GPU/CUDA/MLX-marked)
        run: uv run pytest -m "not gpu and not cuda and not mlx" --cov=stl_seed --cov-report=term-missing

      - name: Coverage report
        if: always()
        run: uv run python -c "import sys; print('coverage check complete')"
